# Android 网络同步修复技能元数据
name: "android-network-sync-fixes"
version: "1.0.0"
description: "修复 Android 网络请求、WebSocket 连接、数据同步相关问题"

# 触发关键词
triggers:
  - "API调用失败"
  - "网络请求失败"
  - "同步失败"
  - "数据不一致"
  - "WebSocket.*断开"
  - "实时消息.*失败"
  - "连接.*超时"
  - "401.*错误"
  - "403.*错误"
  - "Token.*刷新"

# 错误模式
error_patterns:
  - "Retrofit.*Exception"
  - "OkHttp.*Exception"
  - "UnknownHostException"
  - "SocketTimeoutException"
  - "ConnectTimeoutException"
  - "SSLException"
  - "IOException.*network"
  - "WebSocket.*closed"
  - "Sync.*Error"

# 文件模式
file_patterns:
  - "network/**/*"
  - "**/*Retrofit*"
  - "**/*OkHttp*"
  - "**/*WebSocket*"
  - "**/*Sync*"
  - "**/*Network*"

# 优先级 (high/medium/low)
priority: "high"

# 是否为必须技能
is_mandatory: false

# 相关技能
related_skills:
  - "android-debugging-fixes"
  - "android-retrofit-network"

# 适用场景
scenarios:
  - "修复 API 调用失败"
  - "处理 Token 刷新逻辑"
  - "修复 WebSocket 连接问题"
  - "解决数据同步不一致"
  - "处理网络超时和重试"