spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    properties:
      hibernate:
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

  # Explicit production SMTP config to avoid profile inheritance ambiguity.
  mail:
    host: smtpdm.aliyun.com
    port: 465
    protocol: smtps
    username: verify@mail.safevaultapp.top
    password: ${MAIL_PASSWORD}
    from: verify@mail.safevaultapp.top
    properties:
      "[mail.transport.protocol]": smtps
      "[mail.smtps.auth]": true
      "[mail.smtps.ssl.enable]": true
      "[mail.smtps.ssl.checkserveridentity]": true
      "[mail.debug]": true
      "[mail.smtps.connectiontimeout]": 30000
      "[mail.smtps.timeout]": 30000
      "[mail.smtps.writetimeout]": 30000
      "[mail.smtps.ssl.protocols]": TLSv1.2 TLSv1.3

server:
  ssl:
    # Production SSL is terminated at Nginx reverse proxy.
    enabled: false
  # Trust X-Forwarded-* headers from reverse proxy.
  forward-headers-strategy: framework

app:
  base-url: ${APP_BASE_URL:https://server.safevaultapp.top/api}

# JWT Secret must be set in production
jwt:
  secret: ${JWT_SECRET}

# Logging for production
logging:
  level:
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.ttt.safevaultbackend: INFO
  file:
    name: /var/log/safevault/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
