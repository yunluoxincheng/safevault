spring:
  datasource:
    url: jdbc:h2:mem:safevault_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 2525
    username: test
    password: test
    from: test@example.com
  data:
    redis:
      host: localhost
      port: 6379
      password:

server:
  ssl:
    enabled: false

jwt:
  rsa:
    private-key: 
    public-key: 
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

registration:
  cleanup-scheduled-enabled: false
