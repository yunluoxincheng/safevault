services:
  postgres:
    image: postgres:15-alpine
    container_name: safevault-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: safevault-redis
    restart: unless-stopped
    env_file:
      - ./.env
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    container_name: safevault-backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_RSA_PRIVATE_KEY: ${JWT_RSA_PRIVATE_KEY}
      JWT_RSA_PUBLIC_KEY: ${JWT_RSA_PUBLIC_KEY}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_HOST: smtpdm.aliyun.com
      SPRING_MAIL_PORT: 465
      SPRING_MAIL_PROTOCOL: smtps
      SPRING_MAIL_USERNAME: verify@mail.safevaultapp.top
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_APPLICATION_JSON: '{"spring.mail.host":"smtpdm.aliyun.com","spring.mail.port":465,"spring.mail.protocol":"smtps","spring.mail.username":"verify@mail.safevaultapp.top","spring.mail.password":"${MAIL_PASSWORD}","spring.mail.properties.mail.transport.protocol":"smtps","spring.mail.properties.mail.smtps.auth":"true","spring.mail.properties.mail.smtps.ssl.enable":"true","spring.mail.properties.mail.smtps.ssl.checkserveridentity":"true","spring.mail.properties.mail.smtps.connectiontimeout":"30000","spring.mail.properties.mail.smtps.timeout":"30000","spring.mail.properties.mail.smtps.writetimeout":"30000","spring.mail.properties.mail.smtps.ssl.protocols":"TLSv1.2 TLSv1.3","spring.mail.properties.mail.debug":"true"}'
      # Force Jakarta Mail to use implicit TLS on 465 (avoids plain SMTP + isSSL false when Session picks wrong transport).
      JAVA_TOOL_OPTIONS: "-Dmail.transport.protocol=smtps -Dmail.smtps.ssl.enable=true -Dmail.smtps.ssl.checkserveridentity=true"
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/swagger-ui.html"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - ./logs:/var/log/safevault

volumes:
  postgres_data:
  redis_data:
